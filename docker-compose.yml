# Local development services — EDU-ARCH-005
# PostgreSQL 16 + Redis 7 for Sprint 1+ integration work

services:
  postgres:
    image: postgres:16-alpine
    container_name: edutrack-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: edutrack
      POSTGRES_PASSWORD: edutrack_local_dev
      POSTGRES_DB: edutrack
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U edutrack -d edutrack']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: edutrack-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
